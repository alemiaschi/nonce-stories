<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick.
      // Stores the current path in sessionStorage, then redirects to the base URL.
      // The main index.html picks it up and React Router handles the route.
      var base = '/nonce-stories';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('gh-pages-redirect', path + search + hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
