<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nonce-stories/brolm_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Brolm — Nonce Stories</title>
    <script>
      // GitHub Pages SPA redirect: restore path stored by 404.html
      (function() {
        var redirect = sessionStorage.getItem('gh-pages-redirect');
        if (redirect) {
          sessionStorage.removeItem('gh-pages-redirect');
          window.history.replaceState(null, '', '/nonce-stories' + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
